services:
  redis:
    image: redis:7-alpine
    container_name: velopointage-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: velopointage-dev-app
    ports:
      - "62000:62000"
    environment:
      - APP_PORT=62000
      - UVICORN_RELOAD=1
      - ROUTE_NAME=${ROUTE_NAME:-Route DEV}
      - ROUTE_SLUG=${ROUTE_SLUG:-route-dev}
      - REDIS_URL=redis://redis:6379
      - REDIS_ENABLED=true
      - REDIS_CHANNEL=${REDIS_CHANNEL:-passages:route-dev}
      - ADMIN_KEY=${ADMIN_KEY:-dev-admin-key}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:62000}
      - CONFIG_PASSWORD_HASH=${CONFIG_PASSWORD_HASH:-$$2b$$12$$LQv3c1yqBWVHxkd0LHAkCOYz6TtxMeshqdh.h5CjQqgPJ0d8/Qg.m}
      - SESSION_SECRET=${SESSION_SECRET:-dev-session-secret}
      - SESSION_DURATION_HOURS=${SESSION_DURATION_HOURS:-24}
    depends_on:
      - redis
    volumes:
      - ../../:/app
