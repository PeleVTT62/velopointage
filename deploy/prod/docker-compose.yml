services:
  redis:
    image: redis:7-alpine
    container_name: velopointage-prod-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app_route62:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: velopointage-route62-app
    ports:
      - "62000:62000"
    environment:
      - APP_PORT=62000
      - UVICORN_RELOAD=0
      - ROUTE_NAME=Route 62
      - ROUTE_SLUG=route62
      - REDIS_URL=redis://redis:6379
      - REDIS_ENABLED=true
      - REDIS_CHANNEL=passages:route62
      - ADMIN_KEY=${ROUTE62_ADMIN_KEY}
      - ALLOWED_ORIGINS=${ROUTE62_ALLOWED_ORIGINS}
      - CONFIG_PASSWORD_HASH=${ROUTE62_CONFIG_PASSWORD_HASH}
      - SESSION_SECRET=${ROUTE62_SESSION_SECRET}
      - SESSION_DURATION_HOURS=${ROUTE62_SESSION_DURATION_HOURS:-24}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:62000/', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - route62_data:/app/data
      - route62_gpx:/app/static/gpx

  app_route11:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: velopointage-route11-app
    ports:
      - "62010:62000"
    environment:
      - APP_PORT=62000
      - UVICORN_RELOAD=0
      - ROUTE_NAME=${ROUTE11_NAME:-Route 11}
      - ROUTE_SLUG=${ROUTE11_SLUG:-route11}
      - REDIS_URL=redis://redis:6379
      - REDIS_ENABLED=true
      - REDIS_CHANNEL=passages:${ROUTE11_SLUG:-route11}
      - ADMIN_KEY=${ROUTE11_ADMIN_KEY}
      - ALLOWED_ORIGINS=${ROUTE11_ALLOWED_ORIGINS}
      - CONFIG_PASSWORD_HASH=${ROUTE11_CONFIG_PASSWORD_HASH}
      - SESSION_SECRET=${ROUTE11_SESSION_SECRET}
      - SESSION_DURATION_HOURS=${ROUTE11_SESSION_DURATION_HOURS:-24}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:62000/', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - route11_data:/app/data
      - route11_gpx:/app/static/gpx

volumes:
  redis_data:
  route62_data:
  route62_gpx:
  route11_data:
  route11_gpx:
